version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pmo-postgres
    environment:
      POSTGRES_DB: pmo_portal
      POSTGRES_USER: pmo_user
      POSTGRES_PASSWORD: pmo_password_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmo_user -d pmo_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmo-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://pmo_user:pmo_password_local@postgres:5432/pmo_portal
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-placeholder}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-placeholder}
      JWT_SECRET: local_dev_secret_change_in_prod
      FRONTEND_URL: http://localhost:5173
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-local}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pmo-frontend
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_AZURE_TENANT_ID: ${AZURE_TENANT_ID:-placeholder}
      VITE_AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-placeholder}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

volumes:
  postgres_data:
