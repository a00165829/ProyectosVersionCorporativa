services:
  backend:
    image: ${DOCKER_REGISTRY}/pmo-portal:${IMAGE_TAG:-latest}
    container_name: pmo-portal
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      # Group IDs de Microsoft Enterprise Application
      GROUP_ID_ADMINS: ${GROUP_ID_ADMINS}
      GROUP_ID_DIRECTORES: ${GROUP_ID_DIRECTORES}
      GROUP_ID_GERENTES: ${GROUP_ID_GERENTES}
      GROUP_ID_LIDERES: ${GROUP_ID_LIDERES}
      GROUP_ID_USUARIOS: ${GROUP_ID_USUARIOS}
    ports:
      - "8080:8080"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
