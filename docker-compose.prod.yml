version: '3.8'

services:
  backend:
    image: ${DOCKER_REGISTRY}/pmo-backend:${IMAGE_TAG:-latest}
    container_name: pmo-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    expose:
      - "3000"
    restart: always

  frontend:
    image: ${DOCKER_REGISTRY}/pmo-frontend:${IMAGE_TAG:-latest}
    container_name: pmo-frontend
    expose:
      - "80"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: pmo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: always
